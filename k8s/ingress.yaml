# TLS certificate issued by cert-manager using the self-signed ClusterIssuer.
# Add to /etc/hosts:  127.0.0.1  k8s-diagnostic.local
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcp-diagnostics-tls
  namespace: mcp-diagnostics
spec:
  secretName: mcp-diagnostics-tls
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - k8s-diagnostic.local
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-diagnostics
  namespace: mcp-diagnostics
  annotations:
    # Traefik is the default IngressClass in this cluster (isDefaultClass: true).
    # The redirect from port 80 → 443 is handled by Traefik's entrypoint config.
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - k8s-diagnostic.local
      secretName: mcp-diagnostics-tls
  rules:
    - host: k8s-diagnostic.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-diagnostics
                port:
                  name: http
