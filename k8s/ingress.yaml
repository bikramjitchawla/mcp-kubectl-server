# TLS certificate issued by cert-manager using the self-signed ClusterIssuer.
# Uses nip.io wildcard DNS — no /etc/hosts entry required.
# Access at: https://mcp-diagnostics.127.0.0.1.nip.io
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcp-diagnostics-tls
  namespace: mcp-diagnostics
spec:
  secretName: mcp-diagnostics-tls
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - mcp-diagnostics.127.0.0.1.nip.io
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-diagnostics
  namespace: mcp-diagnostics
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - mcp-diagnostics.127.0.0.1.nip.io
      secretName: mcp-diagnostics-tls
  rules:
    - host: mcp-diagnostics.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-diagnostics
                port:
                  name: http
