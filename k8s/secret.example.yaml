# Copy to secret.yaml, fill in base64 values, and apply BEFORE the deployment.
# DO NOT commit secret.yaml to source control.
#
# Generate a key:   openssl rand -hex 32 | base64
# Encode a string:  echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: mcp-diagnostics-secrets
  namespace: mcp-diagnostics
type: Opaque
data:
  # base64-encoded API key (leave empty or omit to run without auth)
  api-key: ""
  # base64-encoded Groq API key — takes priority over OpenAI when set
  # Get yours at https://console.groq.com
  groq-api-key: ""
  # base64-encoded OpenAI API key — used only when groq-api-key is empty
  openai-api-key: ""
