apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: mcp-diagnostics

build:
  artifacts:
    - image: localhost:5001/mcp-diagnostics
      docker:
        dockerfile: Dockerfile
  local:
    # push: true sends the image to the local registry (localhost:5001) which
    # Kind nodes pull from via the kind-registry mirror configured in cluster.yaml.
    push: true

manifests:
  rawYaml:
    - k8s/namespace.yaml
    - k8s/rbac.yaml
    - k8s/deployment.yaml
    - k8s/ingress.yaml

deploy:
  kubectl: {}

# Expose the app at http://localhost:3000 while skaffold dev is running.
portForward:
  - resourceType: service
    resourceName: mcp-diagnostics
    namespace: mcp-diagnostics
    port: 80
    localPort: 3000
